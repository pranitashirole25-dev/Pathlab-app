version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pathology_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-pathology_lab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically run schema on first db initialization
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
    container_name: pathology_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-pathology_lab}
      - DB_PORT=5432
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    ports:
      - "3000:3000"

  admin-panel:
    build:
      context: ./admin-panel
    container_name: pathology_admin
    restart: unless-stopped
    ports:
      - "8080:80"

  staff-pwa:
    build:
      context: ./staff-pwa
    container_name: pathology_staff
    restart: unless-stopped
    ports:
      - "8081:80"

volumes:
  postgres_data:
